    <h1>>Mission Statement</h1

      To provide free coaching and education for cyber security basics. 

Volunteers would provide free assistance and education for basic cyber security necessities. This includes implementing and understanding multi factor authentication on email and other sensitive accounts. 
Topics
This is meant to help prevent any scams or fraud from happening. 
Grace - For everyone outward and inward 
When trying to help others, or even help ourselves, we need to treat all things with grace. Technology is complicated and every changing. We cannot expect other people to have the same level of familiarity with tech. We also can’t expect someone (unless they have an AI handy) to remember every last thing they know about tech in an instant. 

Multi Factor MFA Authentication - For all sensitive accounts 
All email, bank, and other sensitive accounts should have a strong layer of Multi Factor Authentication - MFA. 
FIDO2/WebAuthn 

Spot Spam Emails - If something seems off, it might just be
Anytime someone asks you for money, you should be suspicious. Anytime someone asks you for gift cards, you should be especially suspicious. 

Check Link Address Before Clicking - Just a peek 

This is the concept of hovering the mouse cursor over a link to see where it goes. The link address will appear somewhere in your browser. In Chrome, it is in the lower left corner. 


This is a good idea to do with all links, as any link can be malicious. If the link looks like something other than what you’re trying to navigate to, you might ask someone their opinion on it. For the when in only a little doubt, copy and paste the link into an Incognito Window for Chrome or Private Browsing tab. 

If anything downloads, delete the download immediately! 

If you do find a suspicious link, report it. Use Google or some other search engine to find an online URL reporting tool. Google currently uses this one they made and operate:

https://safebrowsing.google.com/safebrowsing/report_phish/
