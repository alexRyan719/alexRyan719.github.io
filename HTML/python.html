1/13 Intro ----------------------------------------------------------------------------------------------------------

   Intro
Hello and welcome to Beginner Python Concepts! Before we get started with actual Python code, it's important to understand what programming is all about.

Simple Machines
Now, computers are very complex, but the way they operate is about as simple as you can get. They deal in 0s and 1s, and they only do exactly what they're told to. There is no thinking / interpreting / assuming with computers. If you make a mistake, the computer will still follow your poorly written instructions.

Some Perspective
Think about any mundane task. This could be going upstairs, packing a bag for a vacation, or even driving to the post office. When you describe how to do these tasks to other people, you can skip over what we consider "common sense." If your bathroom is upstairs and your guest asks to use it, you just tell them it's upstairs. Maybe you tell them to jiggle the toilet handle if it sticks or it's the second door on the right. However, you don't have to tell them things like "watch out for my dog" or "if the door is closed, there might be someone in it already."

Now, with computers, you have to tell them EXACTLY what to do and how to do it. If you don't tell them to watch out for your dog, they would encounter the dog and crash. If the bathroom was occupied, they would crash. If you had too much stuff in the travel bag, they would keep filling it and crash. If you didn't tell them where the post office is, they would wander and probably crash.

These are exaggerations, as what computers need to do is much simpler as far as tasks go. At the basic level, computers are just locating, calculating, or saving data. That's it. We've come so far as to be able to represent just about anything as data.

    Hello World
This is the classic "Hello World" program in Python. This will print whatever String (array of chars / group of letters) you have between the single (' ') or double quotes (" ")

Being able to print output is very important in coding. You can use print statements to see the values of variables, if sections of code are being executed, or the results of your algorithm.

Formatting is a major part of problem solving with code. String manipulation can be done a few ways in Python

For the rest of the examples, let's declare a String variable to use

Slicing is where you target or work with only parts of a string. To do this, use square brackets ([]). Within the square brackets you can set the start, stop, and step. Or in other words, the starting point, ending point, and how much to count by

    print(test_string[1:6])
Print every other letter

    print(test_string[::2])
Reverse the string

This also works backwards with a negative index

    print(test_string[-1])
    print(test_string[-5])
Set the start point as the fifth character from the end

    print(test_string[-5:])
    print(test_string[-10:-3])

4/13 Primitive Variables ----------------------------------------------------------------------------------------------------------

  Primitive Variables
Primitive Variables are simple, single value variables used in computing. Think of them as shipping boxes to contain data. You need the right type of shipping box / container for different types of data.

Now, with Python, it's harder to see what type a variable is. Python does not require you to declare the type of variable when declaring Primitive variables (as opposed to objects).

Strings / Arrays of Chars = "Hello World!" / "This is also a string" / Any group of characters contained in single ('') or double ("") quotes
Chars / Characters = 'a', 'b', 'Z', '!' / Any single letter or character. Can be in single or double quotes (for Python, not necessarily other languages)
Ints / Integers = 5 / 4 / 5,000,000 / any whole number
Float / Floating Point = 10.0
Bool / Boolean = True / False
To see what type your variable is, use the built-in type() function.
123456789101112

example_string = "Hello World!"
example_char = 'a'
example_int = 5
example_float = 10.0
example_boolean = True

print(type(example_string))
print(type(example_char))
print(type(example_int))
print(type(example_float))
print(type(example_boolean))

5/13 Functions ----------------------------------------------------------------------------------------------------------

    Functions
Functions are sections of code that are meant to accomplish one (or few) action(s). Functions are used to organize code, as well as allow for modularity. Modularity means that code can be reused with little to no adjustments.

When defining a function, you start with the keyword "def", followed by the name of the function and attached parameters / arguments for the function, and finally a colon (:). Any code that is meant to be contained in the function needs to be indented one indent further than the function declaration line.

Try changing the values for each of the functions!
123456789101112131415161718192021222324252627


def multply(a, b):
  return a*b
In this example, the declaration line is "def multiply(a, b):". This means that we have a function named "multiply" that takes two arguments, "a" and "b". The next line returns the value of the two input arguments when they are multiplied together (or the product of the two inputs).

To call a function, we would do something like this:

multiply(2, 5)
Notice that you don't actually see anything in your terminal / output. This is because the nature of this function simply multiplies the arguments and returns the product. If we want to see what value is returned from this function, we would need to either print our call to that function, or add print functionality within the function.

print(multiply(2, 5)
Or

def multply(a, b):
  print(a*b)
  return 0
Either way, we need to define our function BEFORE we try to call it / envoke it / run it. The compiler / interpreter / computer reads our code top down, left to right. This means that if we try to call our function before we define it, we will get an error. The computer doesn't know what we're talking about and will ask us to clarify.
